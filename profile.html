<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AquaLabel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function() {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
    
    <div class="container" style="padding-top: 2rem;">
        
        <div style="max-width: 600px; margin: 0 auto; background: var(--bg-surface); padding: 2rem; border-radius: var(--radius); box-shadow: var(--shadow-md);">
            <div style="text-align: center; margin-bottom: 2rem;">
                 <div style="width: 100px; height: 100px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 3rem;">
                    👤
                </div>
                <h1 id="p-name">Loading...</h1>
                <p id="p-email" style="color: var(--text-muted);">...</p>
                 <p id="p-joined" style="font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem;">Joined ...</p>
            </div>

            <div class="stats-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div style="background: #f8fafc; padding: 1.5rem; text-align: center; border-radius: var(--radius);">
                     <div style="font-size: 2rem; font-weight: 700; color: var(--primary);" id="p-created">0</div>
                     <div style="font-size: 0.8rem; color: var(--text-muted);">Designs</div>
                </div>
                <div style="background: #f8fafc; padding: 1.5rem; text-align: center; border-radius: var(--radius);">
                     <div style="font-size: 2rem; font-weight: 700; color: var(--primary);" id="p-printed">0</div>
                     <div style="font-size: 0.8rem; color: var(--text-muted);">Printed</div>
                </div>
            </div>

            <button class="btn btn-outline" style="width: 100%;" onclick="alert('Profile editing is disabled in this prototype.')">Edit Profile</button>
        </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.App.Data.getUser();
            if (user) {
                document.getElementById('p-name').textContent = user.name;
                document.getElementById('p-email').textContent = user.email;
                document.getElementById('p-joined').textContent = `Member since ${user.joined}`;
                document.getElementById('p-created').textContent = user.stats.created;
                document.getElementById('p-printed').textContent = user.stats.printed;
            }
        });
    </script>
</body>
</html>
