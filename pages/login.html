<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AquaLabel</title>
  <meta name="description" content="Sign in to your AquaLabel account to access your designs and dashboard." />
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    (function () {
      const t = localStorage.getItem("theme");
      const d = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (t === "dark" || (!t && d)) document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div style="font-size: 2.5rem; margin-bottom: 0.75rem;">💧</div>
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Sign in to continue designing</p>

      <form action="dashboard.html" method="get" id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
          Sign In →
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up Free</a>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
