<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — AquaLabel</title>
  <meta name="description" content="Join AquaLabel and start creating beautiful custom water bottle labels for free." />
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    (function () {
      const t = localStorage.getItem("theme");
      const d = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (t === "dark" || (!t && d)) document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div style="font-size: 2.5rem; margin-bottom: 0.75rem;">✨</div>
      <h2>Create Account</h2>
      <p class="auth-subtitle">Start designing beautiful labels today — it's free!</p>

      <form action="dashboard.html" method="get" id="signup-form">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="Alex Water" required />
        </div>
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Create a strong password" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
          Create Free Account →
        </button>
      </form>

      <p style="font-size: 0.78rem; color: var(--text-faint); margin-top: 1rem; text-align: center;">
        By signing up, you agree to our Terms of Service.
      </p>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
