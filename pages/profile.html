<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — AquaLabel</title>
  <meta name="description" content="View and manage your AquaLabel profile, stats, and account details." />
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    (function () {
      const t = localStorage.getItem("theme");
      const d = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (t === "dark" || (!t && d)) document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>

  <div class="container" style="padding-top: 2.5rem; padding-bottom: 4rem; max-width: 700px;">

    <div class="profile-header-card">
      <div class="profile-avatar" id="p-avatar">?</div>
      <div class="profile-info">
        <h2 id="p-name">Loading…</h2>
        <p id="p-email">…</p>
        <p style="margin-top: 0.25rem; font-size: 0.82rem; color: var(--text-faint);" id="p-joined">Member since …</p>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom: 2rem;">
      <div class="stat-card" style="animation-delay:0.05s;">
        <div class="stat-icon">🎨</div>
        <div>
          <div class="stat-value" id="p-created">0</div>
          <div class="stat-label">Designs Created</div>
        </div>
      </div>
      <div class="stat-card" style="animation-delay:0.12s;">
        <div class="stat-icon">🖨️</div>
        <div>
          <div class="stat-value" id="p-printed">0</div>
          <div class="stat-label">Labels Exported</div>
        </div>
      </div>
      <div class="stat-card" style="animation-delay:0.19s;">
        <div class="stat-icon">❤️</div>
        <div>
          <div class="stat-value">24</div>
          <div class="stat-label">Community Likes</div>
        </div>
      </div>
    </div>

    <div style="background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow-md);">
      <h3 style="font-size: 1rem; font-weight: 700; color: var(--text-heading); margin-bottom: 1.5rem; letter-spacing: -0.02em;">Account &amp; Preferences</h3>

      <div style="display: flex; flex-direction: column; gap: 1rem;">
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: var(--bg-page); border-radius: var(--radius-sm); border: 1px solid var(--border);">
          <div>
            <div style="font-weight: 600; font-size: 0.92rem; color: var(--text-heading);">Dark Mode</div>
            <div style="font-size: 0.82rem; color: var(--text-muted);">Toggle between light and dark themes</div>
          </div>
          <button id="profile-theme-toggle" class="btn btn-ghost btn-sm">🌙 Toggle</button>
        </div>

        <div style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: var(--bg-page); border-radius: var(--radius-sm); border: 1px solid var(--border);">
          <div>
            <div style="font-weight: 600; font-size: 0.92rem; color: var(--text-heading);">Saved Designs</div>
            <div style="font-size: 0.82rem; color: var(--text-muted);">View and manage all your label projects</div>
          </div>
          <a href="saved-designs.html" class="btn btn-outline btn-sm">View →</a>
        </div>

        <div style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: var(--bg-page); border-radius: var(--radius-sm); border: 1px solid var(--border);">
          <div>
            <div style="font-weight: 600; font-size: 0.92rem; color: var(--text-heading);">Clear All Data</div>
            <div style="font-size: 0.82rem; color: var(--text-muted);">Delete all saved designs from local storage</div>
          </div>
          <button onclick="clearData()" class="btn btn-sm" style="background:hsla(0,72%,58%,0.1);color:var(--danger);border:1px solid hsla(0,72%,58%,0.2);">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = window.App.Data.getUser();
      if (user) {
        const initials = user.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
        document.getElementById("p-avatar").textContent = initials;
        document.getElementById("p-name").textContent = user.name;
        document.getElementById("p-email").textContent = user.email;
        document.getElementById("p-joined").textContent = `Member since ${user.joined}`;
        document.getElementById("p-created").textContent = user.stats.created;
        document.getElementById("p-printed").textContent = user.stats.printed;
      }
      document.getElementById("profile-theme-toggle").addEventListener("click", () => {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        if (isDark) { document.documentElement.removeAttribute("data-theme"); localStorage.setItem("theme", "light"); }
        else { document.documentElement.setAttribute("data-theme", "dark"); localStorage.setItem("theme", "dark"); }
        window.App.showToast("Theme switched!", "info");
      });
    });

    window.clearData = () => {
      if (confirm("This will delete ALL your saved designs. Are you sure?")) {
        localStorage.removeItem("app_designs");
        window.App.showToast("All designs cleared.", "info");
        setTimeout(() => location.reload(), 800);
      }
    };
  </script>
</body>
</html>
