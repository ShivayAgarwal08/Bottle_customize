<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Designs — AquaLabel</title>
  <meta name="description" content="View, edit, and export all your saved water bottle label designs." />
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    (function () {
      const t = localStorage.getItem("theme");
      const d = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (t === "dark" || (!t && d)) document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>

  <div class="container" style="padding-top: 2.5rem; padding-bottom: 4rem;">
    <div class="dashboard-header" style="display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
      <div>
        <h1>My Designs 💾</h1>
        <p>View, edit, and export your personal label collection.</p>
      </div>
      <a href="design.html" class="btn btn-primary">+ Create New</a>
    </div>

    <div class="designs-grid" id="designs-list"></div>

    <div id="empty-state" style="display: none; text-align: center; padding: 5rem 2rem; color: var(--text-muted);">
      <div style="font-size: 4rem; margin-bottom: 1rem; opacity: 0.4;">🎨</div>
      <h3 style="font-size: 1.4rem; font-weight: 700; color: var(--text-heading); margin-bottom: 0.5rem;">No designs yet</h3>
      <p style="margin-bottom: 1.5rem;">Create your first water bottle label and it will appear here.</p>
      <a href="design.html" class="btn btn-primary btn-lg">Start Designing</a>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => { renderDesigns(); });

    function renderDesigns() {
      const designs = window.App.Data.getDesigns();
      const grid = document.getElementById("designs-list");
      const emptyState = document.getElementById("empty-state");
      grid.innerHTML = "";

      if (!designs || designs.length === 0) {
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";

      designs.forEach((design, i) => {
        const card = document.createElement("div");
        card.className = "design-card";
        card.style.animationDelay = `${i * 0.07}s`;

        const previewEl = design.preview
          ? `<img src="${design.preview}" alt="${design.name}" />`
          : `<div class="design-preview-placeholder">🎨</div>`;

        card.innerHTML = `
          <div class="design-preview">${previewEl}</div>
          <div class="design-info">
            <h3>${design.name}</h3>
            <p class="design-meta">📅 ${design.date}</p>
            <div class="design-actions">
              <button class="btn btn-outline btn-sm" style="flex:1;" onclick="editDesign(${design.id})">✏️ Edit</button>
              <button class="btn btn-primary btn-sm" style="flex:1;" onclick="downloadDesign('${design.preview}', '${design.name}')">⬇ Export</button>
              <button class="btn btn-sm" onclick="deleteDesignItem(${design.id})" style="background:hsla(0,72%,58%,0.1);color:var(--danger);border:1px solid hsla(0,72%,58%,0.2);" title="Delete">🗑️</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      const observer = new IntersectionObserver(
        entries => entries.forEach(e => {
          if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'translateY(0)'; observer.unobserve(e.target); }
        }),
        { threshold: 0.1, rootMargin: '0px 0px -20px 0px' }
      );
      grid.querySelectorAll('.design-card').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(24px)';
        el.style.transition = `opacity 0.5s ease ${i * 0.07}s, transform 0.5s ease ${i * 0.07}s`;
        observer.observe(el);
      });
    }

    window.editDesign = (id) => window.location.href = `design.html?project=${id}`;

    window.downloadDesign = (url, name) => {
      if (!url || url === 'undefined') { alert('No preview available to export.'); return; }
      const link = document.createElement('a');
      link.download = `${name || 'my-label'}-${Date.now()}.png`;
      link.href = url;
      link.click();
    };

    window.deleteDesignItem = (id) => {
      if (confirm('Delete this design? This cannot be undone.')) {
        window.App.Data.deleteDesign(id);
        renderDesigns();
        window.App.showToast('Design deleted', 'info');
      }
    };
  </script>
</body>
</html>
