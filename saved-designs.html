<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Designs - AquaLabel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="container" style="padding-top: 2rem;">
        <div class="dashboard-header">
            <h1>My Saved Designs</h1>
            <p style="color: var(--text-muted);">View, edit, or download your personal label collection.</p>
        </div>

        <div class="designs-grid" id="designs-list">
            <!-- Populated by JS -->
        </div>
        
        <div id="empty-state" style="display: none; text-align: center; padding: 4rem; color: var(--text-muted);">
            <h3>No designs yet</h3>
            <p>Create your first water bottle label today!</p>
            <a href="design.html" class="btn btn-primary" style="margin-top: 1rem;">Start Designing</a>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const designs = window.App.Data.getDesigns();
            const grid = document.getElementById('designs-list');
            const emptyState = document.getElementById('empty-state');

            if (!designs || designs.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            designs.forEach(design => {
                const card = document.createElement('div');
                card.className = 'design-card';
                card.innerHTML = `
                    <div class="design-preview">
                        <img src="${design.preview}" alt="${design.name}">
                    </div>
                    <div class="design-info">
                        <h3 style="font-size: 1.1rem; margin-bottom: 0.25rem;">${design.name}</h3>
                        <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem;">Created on ${design.date}</p>
                        
                        <div class="design-actions">
                            <button class="btn btn-outline" style="flex: 1; padding: 0.5rem;" onclick="alert('In a real app, this would load the editor with ID: ${design.id}')">Edit</button>
                            <a href="${design.preview}" download="label-${design.id}.png" class="btn btn-primary" style="flex: 1; padding: 0.5rem; text-decoration: none; text-align: center;">Export</a>
                            <button class="btn btn-danger" style="padding: 0.5rem;" onclick="deleteDesign(${design.id})">❌</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        });

        function deleteDesign(id) {
            if(confirm('Are you sure you want to delete this design?')) {
                window.App.Data.deleteDesign(id);
                window.location.reload();
            }
        }
    </script>
</body>
</html>
