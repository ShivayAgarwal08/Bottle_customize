<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Label - AquaLabel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function() {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body style="overflow: hidden;"> <!-- Prevent body scroll during drag -->

    <div class="editor-container">
        <!-- Sidebar Controls -->
        <div class="toolbar">
            <h2 style="margin-bottom: 2rem;">Label Editor</h2>
            
                <div style="display: flex; gap: 0.5rem; justify-content: space-between; margin-bottom: 1rem;">
                    <button class="btn btn-primary" id="save-project-btn" style="flex:1; font-size: 0.8rem; background-color: #10b981;">💾 Save</button>
                    <button class="btn btn-outline" id="undo-btn" style="flex:1; font-size: 0.8rem;">↩ Undo</button>
                    <button class="btn btn-outline" id="clear-btn" style="flex:1; font-size: 0.8rem; color: #ef4444; border-color: #ef4444;">🗑️ Clear</button>
                </div>
            
            <div class="tool-group">
                <h3>Template Size</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                    <button class="btn btn-outline" onclick="editor.resize(600, 300)" style="font-size: 0.8rem; padding: 0.25rem;">250ml (Std)</button>
                    <button class="btn btn-outline" onclick="editor.resize(800, 400)" style="font-size: 0.8rem; padding: 0.25rem;">500ml Bottle</button>
                    <button class="btn btn-outline" onclick="editor.resize(900, 300)" style="font-size: 0.8rem; padding: 0.25rem;">1L Bottle</button>
                    <button class="btn btn-outline" onclick="editor.resize(400, 400)" style="font-size: 0.8rem; padding: 0.25rem;">Square</button>
                </div>
            </div>

             <div class="tool-group">
                <h3>Add Elements</h3>
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                     <button class="btn btn-outline" id="add-rect-btn" style="flex: 1; font-size: 1.2rem;" title="Add Rectangle">⬜</button>
                     <button class="btn btn-outline" id="add-circle-btn" style="flex: 1; font-size: 1.2rem;" title="Add Circle">⚪</button>
                </div>
            </div>

            <div class="tool-group">
                <h3>Background Color</h3>
                <div class="color-picker-wrapper" id="bg-colors">
                    <!-- Populated by JS -->
                </div>
                <input type="color" id="custom-bg-color" style="width: 100%; height: 40px; margin-top: 10px; cursor: pointer;">
            </div>

            <div class="tool-group">
                <h3>Text Tools</h3>
                <input type="text" id="text-input" placeholder="Enter text..." style="width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius);">
                
                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <select id="font-family" style="flex: 2; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius);">
                        <option value="Inter, sans-serif">Inter</option>
                        <option value="serif">Serif</option>
                        <option value="cursive">Handwritten</option>
                        <option value="monospace">Mono</option>
                    </select>
                    <input type="number" id="text-size" value="24" min="10" max="100" style="width: 60px; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius);">
                </div>

                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <input type="color" id="text-color" value="#000000" style="height: 38px; width: 40px; padding: 0; border: none; cursor: pointer;">
                    <button class="btn btn-primary" id="add-text-btn" style="flex: 1;">+ Add Text</button>
                </div>
            </div>

            <div class="tool-group">
                <h3>Images</h3>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Or drag & drop from desktop</p>
                <div style="margin-bottom: 1rem;">
                    <label class="btn btn-outline" style="width: 100%; cursor: pointer;">
                        Upload Logo/Image
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    </label>
                </div>
            </div>

            <!-- Properties Panel (Dynamic) -->
            <div id="properties-panel" class="tool-group" style="display: none; background: #f1f5f9; padding: 1rem; border-radius: var(--radius);">
                <h3>Properties</h3>
                <div id="prop-content"></div>
            </div>

            <div class="tool-group" style="margin-top: auto;">
                <div id="selection-tools" style="display: none; margin-bottom: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                    <h3 style="margin-bottom: 0.5rem;">Selection</h3>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                         <button class="btn btn-outline" onclick="editor.moveLayer('up')" style="flex: 1; font-size: 0.8rem;">To Front</button>
                         <button class="btn btn-outline" onclick="editor.moveLayer('down')" style="flex: 1; font-size: 0.8rem;">To Back</button>
                    </div>
                     <button class="btn btn-outline" id="delete-el-btn" style="width: 100%; color: #ef4444; border-color: #ef4444;">Remove Element</button>
                </div>
                
                <button class="btn btn-primary" id="preview-btn" style="width: 100%; margin-bottom: 0.5rem; background-color: #8b5cf6;">👓 Preview on Bottle</button>
                <button class="btn btn-primary" id="export-btn" style="width: 100%; margin-bottom: 1rem;">Export Label (PNG)</button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <canvas id="editor-canvas"></canvas>
            <div style="position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.8rem; pointer-events: none;">
                Drag elements to move • Click to select
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/editor.js"></script>
    <!-- 3D Preview Modal -->
    <div id="preview-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 1rem;">Live Preview</h2>
            <div class="bottle-container">
                <div class="bottle-highlight"></div>
                <div id="bottle-label" class="bottle-label-wrap"></div>
            </div>
            <button class="btn btn-outline" onclick="document.getElementById('preview-modal').style.display='none'">Close Preview</button>
        </div>
    </div>
</body>
</html>
