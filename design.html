<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Label - AquaLabel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="overflow: hidden;"> <!-- Prevent body scroll during drag -->

    <div class="editor-container">
        <!-- Sidebar Controls -->
        <div class="toolbar">
            <h2 style="margin-bottom: 2rem;">Label Editor</h2>
            
            <div class="tool-group">
                <h3>Canvas Size</h3>
                <div style="display: flex; gap: 0.5rem; justify-content: space-between; margin-bottom: 1rem;">
                    <button class="btn btn-outline" onclick="editor.resize(600, 300)" style="flex:1; font-size: 0.8rem;">Standard</button>
                    <button class="btn btn-outline" onclick="editor.resize(400, 400)" style="flex:1; font-size: 0.8rem;">Square</button>
                </div>
            </div>

            <div class="tool-group">
                <h3>Background Color</h3>
                <div class="color-picker-wrapper" id="bg-colors">
                    <!-- Populated by JS -->
                </div>
                <input type="color" id="custom-bg-color" style="width: 100%; height: 40px; margin-top: 10px; cursor: pointer;">
            </div>

            <div class="tool-group">
                <h3>Text</h3>
                <input type="text" id="text-input" placeholder="Enter text..." style="width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius);">
                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <input type="color" id="text-color" value="#000000" style="height: 38px; width: 40px; padding: 0; border: none;">
                    <input type="number" id="text-size" value="24" min="10" max="100" style="width: 60px; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius);">
                    <button class="btn btn-primary" id="add-text-btn" style="flex: 1;">Add Text</button>
                </div>
            </div>

            <div class="tool-group">
                <h3>Images</h3>
                <div style="margin-bottom: 1rem;">
                    <label class="btn btn-outline" style="width: 100%; cursor: pointer;">
                        Upload Logo/Image
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    </label>
                </div>
            </div>

            <div class="tool-group" style="margin-top: auto;">
                <button class="btn btn-primary" id="export-btn" style="width: 100%; margin-bottom: 1rem;">Export Label (PNG)</button>
                <button class="btn btn-outline" id="clear-btn" style="width: 100%; color: #ef4444; border-color: #ef4444;">Clear Canvas</button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <canvas id="editor-canvas"></canvas>
            <div style="position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.8rem; pointer-events: none;">
                Drag elements to move • Click to select
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
